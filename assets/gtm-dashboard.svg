<svg viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GTM Intelligence Dashboard">
  <title>GTM Intelligence Dashboard — Siddhartha Kothi</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0714"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="bgRadial" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0d0714" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes numPulse {
        0%,100% { opacity:1; }
        50%      { opacity:0.72; }
      }
      @keyframes borderPulse {
        0%,100% { stroke-opacity:.32; }
        50%      { stroke-opacity:.85; }
      }
      @keyframes stageGlow {
        0%,100% { opacity:.55; }
        50%      { opacity:1; }
      }
      @keyframes scanLine {
        0%   { transform:translateY(0); opacity:.18; }
        100% { transform:translateY(430px); opacity:.04; }
      }
      .c1 { animation: fadeUp .9s .10s ease-out both; }
      .c2 { animation: fadeUp .9s .30s ease-out both; }
      .c3 { animation: fadeUp .9s .50s ease-out both; }
      .c4 { animation: fadeUp .9s .70s ease-out both; }
      .num { animation: numPulse 3.2s ease-in-out infinite; }
      .bd  { animation: borderPulse 3s ease-in-out infinite; }
      .sg  { animation: stageGlow 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background layers -->
  <rect width="860" height="430" rx="14" fill="url(#bg)"/>
  <rect width="860" height="430" rx="14" fill="url(#bgRadial)"/>

  <!-- Outer border with pulse -->
  <rect width="860" height="430" rx="14" fill="none" stroke="#7c3aed" stroke-width="1.5" class="bd"/>

  <!-- Corner brackets -->
  <polyline points="14,42 14,14 42,14" fill="none" stroke="#7c3aed" stroke-width="1.8" opacity=".8"/>
  <polyline points="846,42 846,14 818,14" fill="none" stroke="#7c3aed" stroke-width="1.8" opacity=".8"/>
  <polyline points="14,388 14,416 42,416" fill="none" stroke="#7c3aed" stroke-width="1.8" opacity=".8"/>
  <polyline points="846,388 846,416 818,416" fill="none" stroke="#7c3aed" stroke-width="1.8" opacity=".8"/>

  <!-- Scan line animation -->
  <rect x="14" y="-2" width="832" height="2" fill="#7c3aed" opacity=".12">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,434" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".14;.04;.14" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Header -->
  <text x="430" y="40" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="15" fill="#e9d5ff" font-weight="700" letter-spacing="3.5">GTM INTELLIGENCE DASHBOARD</text>
  <text x="430" y="58" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="9" fill="#4b5563" letter-spacing="3">PRODUCTION METRICS  ·  INOAPPS LTD  ·  HOUSTON, TX</text>

  <!-- Header divider -->
  <line x1="50" y1="68" x2="810" y2="68" stroke="#1f2937" stroke-width="1"/>

  <!-- ─── METRIC CARDS ─── -->

  <!-- Card 1: 280K -->
  <g class="c1">
    <rect x="18" y="80" width="193" height="110" rx="9" fill="url(#cg1)" stroke="#7c3aed" stroke-width="1" class="bd"/>
    <!-- top accent line -->
    <line x1="28" y1="80" x2="100" y2="80" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <text x="28" y="102" font-family="'Courier New',Courier,monospace" font-size="8" fill="#7c3aed" letter-spacing="2" font-weight="700">CONTACTS PROCESSED</text>
    <text x="115" y="152" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="40" font-weight="700" fill="#a78bfa" filter="url(#glow)" class="num">280K</text>
    <text x="115" y="178" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">Salesforce → HubSpot · zero manual</text>
  </g>

  <!-- Card 2: 222K -->
  <g class="c2">
    <rect x="226" y="80" width="193" height="110" rx="9" fill="url(#cg2)" stroke="#4f46e5" stroke-width="1" class="bd"/>
    <line x1="236" y1="80" x2="308" y2="80" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
    <text x="236" y="102" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4f46e5" letter-spacing="2" font-weight="700">VALIDATED EMAILS</text>
    <text x="323" y="152" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="40" font-weight="700" fill="#818cf8" filter="url(#glow)" class="num">~222K</text>
    <text x="323" y="178" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">ZeroBounce · NeverBounce validated</text>
  </g>

  <!-- Card 3: 211K -->
  <g class="c3">
    <rect x="434" y="80" width="193" height="110" rx="9" fill="url(#cg3)" stroke="#6d28d9" stroke-width="1" class="bd"/>
    <line x1="444" y1="80" x2="516" y2="80" stroke="#6d28d9" stroke-width="2.5" stroke-linecap="round"/>
    <text x="444" y="102" font-family="'Courier New',Courier,monospace" font-size="8" fill="#6d28d9" letter-spacing="2" font-weight="700">LINKEDIN URLS ENRICHED</text>
    <text x="531" y="152" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="40" font-weight="700" fill="#c4b5fd" filter="url(#glow)" class="num">~211K</text>
    <text x="531" y="178" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">Apollo · ZoomInfo · Clay enriched</text>
  </g>

  <!-- Card 4: 13 -->
  <g class="c4">
    <rect x="642" y="80" width="200" height="110" rx="9" fill="url(#cg4)" stroke="#7c3aed" stroke-width="1" class="bd"/>
    <line x1="652" y1="80" x2="724" y2="80" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <text x="652" y="102" font-family="'Courier New',Courier,monospace" font-size="8" fill="#7c3aed" letter-spacing="2" font-weight="700">REAL-TIME SIGNAL SOURCES</text>
    <text x="742" y="152" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="40" font-weight="700" fill="#a78bfa" filter="url(#glow)" class="num">13</text>
    <text x="742" y="178" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">Intent detection engine · live</text>
  </g>

  <!-- ─── PIPELINE SECTION ─── -->
  <line x1="50" y1="206" x2="810" y2="206" stroke="#1f2937" stroke-width="1"/>
  <text x="430" y="224" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="9" fill="#374151" letter-spacing="3">7-STAGE ENRICHMENT PIPELINE</text>

  <!-- Pipeline track background -->
  <rect x="34" y="255" width="792" height="30" rx="15" fill="#0a0d14" stroke="#1f2937" stroke-width="1"/>

  <!-- SF source node -->
  <circle cx="72" cy="270" r="17" fill="#12062a" stroke="#7c3aed" stroke-width="1.5" class="sg"/>
  <text x="72" y="267" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#7c3aed" font-weight="700">SF</text>
  <text x="72" y="278" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6" fill="#4b5563">280K</text>

  <!-- Connector -->
  <line x1="90" y1="270" x2="113" y2="270" stroke="#7c3aed" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="111,267 117,270 111,273" fill="#7c3aed" opacity=".5"/>

  <!-- Stage: CLEAN -->
  <rect x="118" y="257" width="72" height="26" rx="5" fill="#12062a" stroke="#7c3aed" stroke-width="1" class="sg"/>
  <text x="154" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#a78bfa" font-weight="700">① CLEAN</text>

  <line x1="190" y1="270" x2="210" y2="270" stroke="#7c3aed" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="208,267 214,270 208,273" fill="#4f46e5" opacity=".5"/>

  <!-- Stage: RESOLVE -->
  <rect x="215" y="257" width="80" height="26" rx="5" fill="#080e20" stroke="#4f46e5" stroke-width="1" class="sg"/>
  <text x="255" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#818cf8" font-weight="700">② RESOLVE</text>

  <line x1="295" y1="270" x2="314" y2="270" stroke="#4f46e5" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="312,267 318,270 312,273" fill="#6d28d9" opacity=".5"/>

  <!-- Stage: ENRICH -->
  <rect x="319" y="257" width="76" height="26" rx="5" fill="#12062a" stroke="#6d28d9" stroke-width="1" class="sg"/>
  <text x="357" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#c4b5fd" font-weight="700">③ ENRICH</text>

  <line x1="395" y1="270" x2="414" y2="270" stroke="#6d28d9" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="412,267 418,270 412,273" fill="#7c3aed" opacity=".5"/>

  <!-- Stage: VALIDATE -->
  <rect x="419" y="257" width="84" height="26" rx="5" fill="#080e20" stroke="#7c3aed" stroke-width="1" class="sg"/>
  <text x="461" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#a78bfa" font-weight="700">④ VALIDATE</text>

  <line x1="503" y1="270" x2="522" y2="270" stroke="#7c3aed" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="520,267 526,270 520,273" fill="#4f46e5" opacity=".5"/>

  <!-- Stage: PREDICT -->
  <rect x="527" y="257" width="78" height="26" rx="5" fill="#12062a" stroke="#4f46e5" stroke-width="1" class="sg"/>
  <text x="566" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#818cf8" font-weight="700">⑤ PREDICT</text>

  <line x1="605" y1="270" x2="624" y2="270" stroke="#4f46e5" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="622,267 628,270 622,273" fill="#6d28d9" opacity=".5"/>

  <!-- Stage: SCORE -->
  <rect x="629" y="257" width="72" height="26" rx="5" fill="#080e20" stroke="#6d28d9" stroke-width="1" class="sg"/>
  <text x="665" y="274" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#c4b5fd" font-weight="700">⑥ SCORE</text>

  <line x1="701" y1="270" x2="720" y2="270" stroke="#6d28d9" stroke-width="1" stroke-opacity=".4"/>
  <polygon points="718,267 724,270 718,273" fill="#FF7A59" opacity=".5"/>

  <!-- HubSpot dest node -->
  <circle cx="754" cy="270" r="17" fill="#1a0800" stroke="#FF7A59" stroke-width="1.5" class="sg"/>
  <text x="754" y="267" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#FF7A59" font-weight="700">HS</text>
  <text x="754" y="278" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6" fill="#4b5563">CRM</text>

  <!-- Animated flowing dots -->
  <circle cy="270" r="5.5" fill="#7c3aed" filter="url(#dotglow)">
    <animate attributeName="cx" from="72" to="754" dur="5s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cy="270" r="4.5" fill="#818cf8" filter="url(#dotglow)">
    <animate attributeName="cx" from="72" to="754" dur="5s" repeatCount="indefinite" begin="1.7s"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="5s" repeatCount="indefinite" begin="1.7s"/>
  </circle>
  <circle cy="270" r="3.5" fill="#c4b5fd">
    <animate attributeName="cx" from="72" to="754" dur="5s" repeatCount="indefinite" begin="3.4s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0" keyTimes="0;0.05;0.5;0.95;1" dur="5s" repeatCount="indefinite" begin="3.4s"/>
  </circle>

  <!-- Stage sub-labels -->
  <text x="154" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">normalize</text>
  <text x="255" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">domain lookup</text>
  <text x="357" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">4 vendors</text>
  <text x="461" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">deliverability</text>
  <text x="566" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">email pattern</text>
  <text x="665" y="297" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="6.5" fill="#374151">confidence</text>

  <!-- ─── BOTTOM STATS STRIP ─── -->
  <line x1="50" y1="315" x2="810" y2="315" stroke="#1f2937" stroke-width="1"/>

  <text x="188" y="343" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="13" fill="#a78bfa" font-weight="700">4 vendors</text>
  <text x="188" y="360" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">ZoomInfo · Apollo · Clay · Apify</text>

  <!-- Vertical dividers -->
  <line x1="375" y1="320" x2="375" y2="370" stroke="#1f2937" stroke-width="1"/>
  <line x1="485" y1="320" x2="485" y2="370" stroke="#1f2937" stroke-width="1"/>

  <text x="430" y="343" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="13" fill="#818cf8" font-weight="700">10 workers</text>
  <text x="430" y="360" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">parallel enrichment processing</text>

  <text x="672" y="343" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="13" fill="#c4b5fd" font-weight="700">30-day TTL</text>
  <text x="672" y="360" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4b5563">enrichment_cache  ·  cost optimized</text>

  <!-- Footer -->
  <line x1="50" y1="378" x2="810" y2="378" stroke="#1f2937" stroke-width="1"/>
  <text x="430" y="400" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="9" fill="#374151" letter-spacing="1.5">built solo  ·  ships in weeks  ·  zero manual intervention</text>
  <text x="430" y="418" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="8" fill="#2d3748" letter-spacing="1">github.com/siddhartha0810</text>
</svg>
